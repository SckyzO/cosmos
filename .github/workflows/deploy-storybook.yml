name: Deploy Storybook to GitHub Pages

# Storybook is served at https://sckyzo.github.io/cosmos/ — note the
# `/cosmos/` sub-path. The build is told about that sub-path via the
# STORYBOOK_BASE_PATH env var, which `apps/storybook/.storybook/main.ts`
# wires into Vite's `base` option so every asset URL ends up absolute.
#
# This workflow replaces the previous Cloudflare Pages deployment. The
# Cloudflare version stays in git history if we want to migrate back
# later (the `cosmos.pages.dev` slug was already taken on Cloudflare).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel an in-flight deploy when a fresh commit lands on main, but
# don't let preview/build jobs cancel each other across branches.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Storybook (static)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        # No `version:` here on purpose — `packageManager: pnpm@X.Y.Z` in
        # package.json is the single source of truth. Setting both produces:
        #   Error: Multiple versions of pnpm specified
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        env:
          # Served under /cosmos/ on github.io — Vite rewrites every asset
          # URL with this prefix at build time.
          STORYBOOK_BASE_PATH: /cosmos/
        run: pnpm storybook:build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./apps/storybook/storybook-static

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
