# Version automation. On every push to main, release-please maintains a single
# "release PR" that bumps the changed packages and their CHANGELOGs from the
# Conventional Commits since the last release. Merging that PR creates the git
# tags (@sckyzo/cosmos-<pkg>@<version>), which publish.yml is already wired to
# publish from.
#
# Tag format is pinned to match publish.yml: component = the npm package name,
# tag-separator "@", no "v" prefix → @sckyzo/cosmos-react@1.2.3.
#
# Token: GITHUB_TOKEN on purpose. Commits it authors through the API are
# GitHub-signed (web-flow, "Verified"), so the release PR satisfies main's
# required_signatures — a PAT authors unsigned commits, which the branch rejects.
# The "Allow GitHub Actions to create pull requests" repo setting is enabled so
# the token may open the PR. The trade-off: a tag pushed by GITHUB_TOKEN does not
# re-trigger publish.yml, so after merging a release PR, publish to npm by running
# publish.yml manually (Actions → Publish to npm → Run workflow).
name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Maintain the release PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          token: ${{ github.token }}
