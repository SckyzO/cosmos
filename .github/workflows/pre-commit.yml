# Runs the full pre-commit suite in CI. The hooks are declared in
# .pre-commit-config.yaml but never ran anywhere: pre-commit is not installed on
# the host (container-first) and no other workflow invoked it, so gitleaks,
# actionlint, hadolint, shellcheck, shfmt and the rest were dead. This is the one
# enforcement point that survives the "nothing on the host" rule.
name: pre-commit

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Run all hooks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'
      - name: Cache pre-commit environments
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Install pre-commit
        run: pip install pre-commit
      # commit-msg-stage hooks (conventional-pre-commit) are skipped by
      # --all-files; they gate real commits, not a bulk file scan.
      - name: Run hooks
        run: pre-commit run --all-files --show-diff-on-failure --color=always
