name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint + typecheck + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        # No `version:` here — `packageManager: pnpm@X.Y.Z` in package.json
        # is the single source of truth. Setting both produces:
        #   Error: Multiple versions of pnpm specified
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Build packages
        run: pnpm build

      - name: Build Storybook
        run: pnpm storybook:build

      # `pnpm test` is recursive across workspaces and `tests/e2e`'s test
      # script invokes Playwright, so the browsers have to exist before we
      # run it. Installing here covers both `Unit tests` (which actually
      # contains the e2e suite via `pnpm -r test`) and downstream needs.
      - name: Install Playwright browsers
        run: pnpm --filter @cosmos/e2e exec playwright install --with-deps chromium firefox

      - name: Unit + E2E tests
        run: pnpm test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
