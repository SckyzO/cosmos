name: Publish to npm

on:
  push:
    tags:
      - '@sckyzo/cosmos-theme@*'
      - '@sckyzo/cosmos-react@*'
      - '@sckyzo/cosmos-charts@*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        type: choice
        required: true
        options:
          - cosmos-theme
          - cosmos-react
          - cosmos-charts

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ inputs.package || 'tagged' }} to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm-publish
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        # No `version:` — `packageManager: pnpm@X.Y.Z` in package.json is the
        # single source of truth. Setting both errors with
        # "Multiple versions of pnpm specified".
        uses: pnpm/action-setup@v6

      - name: Setup Node
        # Node 24 ships npm 11.12+ (>= 11.5.1, required for OIDC trusted
        # publishing). `registry-url` is REQUIRED (per npm's official trusted-
        # publishing example): it sets the registry context. npm CLI treats the
        # unresolved `${NODE_AUTH_TOKEN}` placeholder as empty and falls through
        # to OIDC when a trusted publisher is configured.
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      # Tokenless via OIDC trusted publishing — no NPM_TOKEN. Each package must
      # have a trusted publisher configured on npmjs.com (repo SckyzO/cosmos,
      # workflow publish.yml, env npm-publish).
      #
      # We run `npm publish` from the package DIRECTORY (not a tarball): OIDC
      # trusted publishing only engages on a directory publish, not on
      # `npm publish <tarball>`. npm doesn't understand the pnpm `workspace:*`
      # protocol, so cosmos-react's theme dependency is rewritten to the real
      # version just before publishing. theme/charts have no workspace deps.
      - name: Publish (tagged)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_REF: ${{ github.ref }}
        run: |
          tag="${GH_REF#refs/tags/}"      # @sckyzo/cosmos-theme@0.0.2
          name="${tag%@*}"                # @sckyzo/cosmos-theme
          short="${name##*cosmos-}"       # theme
          cd "packages/$short"
          if [ "$short" = "react" ]; then
            npm pkg set "dependencies.@sckyzo/cosmos-theme=^$(node -p "require('../theme/package.json').version")"
          fi
          npm publish --provenance --access public

      - name: Publish (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          PKG: ${{ inputs.package }} # cosmos-theme
        run: |
          short="${PKG##*cosmos-}"        # theme
          cd "packages/$short"
          if [ "$short" = "react" ]; then
            npm pkg set "dependencies.@sckyzo/cosmos-theme=^$(node -p "require('../theme/package.json').version")"
          fi
          npm publish --provenance --access public
