name: Publish to npm

on:
  push:
    tags:
      - '@sckyzo/cosmos-theme@*'
      - '@sckyzo/cosmos-react@*'
      - '@sckyzo/cosmos-charts@*'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        type: choice
        required: true
        options:
          - cosmos-theme
          - cosmos-react
          - cosmos-charts

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ inputs.package || 'tagged' }} to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm-publish
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        # No `version:` — `packageManager: pnpm@X.Y.Z` in package.json is the
        # single source of truth. Setting both errors with
        # "Multiple versions of pnpm specified".
        uses: pnpm/action-setup@v6

      - name: Setup Node
        # Node 24 ships npm 11.12+ (>= 11.5.1, required for OIDC trusted
        # publishing) — avoids a flaky `npm install -g npm@latest` self-upgrade
        # from npm 10 that fails with "Cannot find module 'promise-retry'".
        #
        # No `registry-url:` on purpose — it would write an `.npmrc` line
        # `//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}`; with no token
        # set, npm authenticates with an empty token (404) instead of engaging
        # OIDC trusted publishing. OIDC only kicks in when no auth token is
        # configured. The default registry is already registry.npmjs.org.
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      # Tokenless via OIDC trusted publishing — no NPM_TOKEN. Each package must
      # have a trusted publisher configured on npmjs.com (repo SckyzO/cosmos,
      # workflow publish.yml, env npm-publish). `pnpm pack` rewrites the
      # `workspace:*` theme dependency into the tarball; `npm publish <tarball>`
      # then authenticates via OIDC and attaches provenance.
      - name: Publish (tagged)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_REF: ${{ github.ref }}
        run: |
          tag="${GH_REF#refs/tags/}"      # @sckyzo/cosmos-theme@0.0.2
          name="${tag%@*}"                # @sckyzo/cosmos-theme
          short="${name##*cosmos-}"       # theme
          cd "packages/$short"
          pnpm pack
          npm publish ./*.tgz --provenance --access public

      - name: Publish (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          PKG: ${{ inputs.package }} # cosmos-theme
        run: |
          short="${PKG##*cosmos-}"        # theme
          cd "packages/$short"
          pnpm pack
          npm publish ./*.tgz --provenance --access public
