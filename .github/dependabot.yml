version: 2
updates:
  # ---------------------------------------------------------------------------
  # npm via pnpm — root + all workspaces
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      react:
        patterns:
          - "react*"
          - "@types/react*"
        update-types:
          - "minor"
          - "patch"
      storybook:
        patterns:
          - "storybook"
          - "@storybook/*"
        update-types:
          - "minor"
          - "patch"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "prettier-plugin-tailwindcss"
        update-types:
          - "minor"
          - "patch"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
        update-types:
          - "minor"
          - "patch"
      typescript:
        patterns:
          - "typescript"
          - "typescript-eslint"
          - "tsup"
          - "@types/*"
        update-types:
          - "minor"
          - "patch"
      lint:
        patterns:
          - "eslint*"
          - "prettier"
          - "@typescript-eslint/*"
          - "stylelint*"
        update-types:
          - "minor"
          - "patch"
      playwright:
        patterns:
          - "@playwright/*"
        update-types:
          - "minor"
          - "patch"

  # ---------------------------------------------------------------------------
  # GitHub Actions — pin by SHA, weekly bumps
  # ---------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "actions/*"
          - "github/*"
        update-types:
          - "minor"
          - "patch"

  # ---------------------------------------------------------------------------
  # Docker (Dockerfile.dev base image)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "docker"
    directory: "/config/docker"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(docker)"
      include: "scope"
